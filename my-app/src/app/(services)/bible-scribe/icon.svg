    <line x1="4" y1="11" x2="9" y2="11" stroke="#f5f0e8" stroke-width="0.5" opacity="0.5"/>
    <line x1="4" y1="13" x2="8" y2="13" stroke="#f5f0e8" stroke-width="0.5" opacity="0.5"/>
    <!-- Text lines (right page) -->
    <line x1="13" y1="9" x2="18" y2="9" stroke="#f5f0e8" stroke-width="0.5" opacity="0.5"/>
    <line x1="13" y1="11" x2="18" y2="11" stroke="#f5f0e8" stroke-width="0.5" opacity="0.5"/>
    <line x1="13" y1="13" x2="17" y2="13" stroke="#f5f0e8" stroke-width="0.5" opacity="0.5"/>
    <!-- Cross accent -->
    <line x1="11" y1="22" x2="11" y2="26" stroke="#b8860b" stroke-width="1.2"/>
